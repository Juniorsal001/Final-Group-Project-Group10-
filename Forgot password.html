<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - SuperMarket Eco</title>
    <link rel="stylesheet" href="forgot password.css">
</head>
<body>

    <div class="login-container">
        <div class="login-card">
            <div class="brand-header">
                <h1 class="brand-logo">CitySuper Market <span class="eco-text">SL</span></h1>
                <p class="subtitle">Reset your account password</p>
            </div>

            <p style="font-size: 0.9rem; color: #7f8c8d; margin-bottom: 20px; text-align: center;">
                Enter your email address below, and we will send you instructions to safely reset your password access.
            </p>

            <form id="forgotForm">
                <div class="form-group">
                    <label for="resetEmail">Email Address</label>
                    <input type="email" id="resetEmail" placeholder="Enter your registered email" required>
                </div>

                <div class="form-actions">
                    <a href="Sign in.html" class="back-link">Back to Sign In</a>
                </div>

                <button type="submit" class="primary-btn">Send Reset Link</button>
            </form>
        </div>
    </div>

    <script src="Forgot password.js"></script>
</body>
</html>
