<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<link rel="stylesheet" href="Contact Us.css">
<body>

     <header class="navbar">
        <div class="logo">SuperMarket <span>Eco</span></div>
        <nav>
            <ul class="nav-links" id="navLinks">
                <li><a href="Market.html">Home</a></li>
                <li><a href="Product.html">Products</a></li>
                <li><a href="Contact Us.html">Contact Us</a></li>
                <li><a href="Form.html">Create Form</a></li>
                <li><a href="Login.html"></a></li>
            </ul>
        </nav>
        <div class="cart-icon" onclick="toggleCart()">
            🛒 <span id="cart-count">0</span>
        </div>
        <div class="menu-toggle" onclick="toggleMenu()">☰</div>
    </header>

    <section class="contact-section">
    <div class="contact-container">
        
        <div class="contact-info">
            <h2>Get in Touch</h2>
            <p>Have questions about our market system or need assistance? Drop us a message, and our team will get back to you shortly.</p>
            
            <div class="info-details">
                <div class="info-item">
                    <span class="icon">📍</span>
                    <p>123 Market Street, Tech City</p>
                </div>
                <div class="info-item">
                    <span class="icon">📞</span>
                    <p>+232 3048-9214</p>
                </div>
                <div class="info-item">
                    <span class="icon">✉️</span>
                    <p>support@marketsystem.com</p>
                </div>
            </div>
        </div>

        <div class="contact-form-wrapper">
            <form class="market-form">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" placeholder="Hassan Kamara" required>
                </div>
                
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="Hassan@example.com" required>
                </div>
                
                <div class="form-group">
                    <label for="subject">Subject</label>
                    <input type="text" id="subject" placeholder="How can we help?" required>
                </div>
                
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" rows="5" placeholder="Your message here..." required></textarea>
                </div>
                
                <button type="submit" class="submit-btn">Send Message</button>
            </form>
        </div>

    </div>

    <script src="Contact Us.js"></script>
</section>
</body>
</html>
