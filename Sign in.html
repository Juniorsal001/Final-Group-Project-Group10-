<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SuperMarket Eco - Sign In</title>
    <link rel="stylesheet" href="Sign in.css">
</head>
<body>

    <div class="login-container">
        <div class="login-card">
            <div class="brand-header">
                <h1 class="brand-logo">CitySuper Market <span class="eco-text">SL</span></h1>
                <p class="subtitle">Sign in to manage your account</p>
            </div>

            <form id="signInForm">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>

                <div class="form-actions">
                    <a href="Form.html" class="Go Back">Go Back</a>
                    <a href="Forgot password.html" class="forgot-pass">Forgot Password?</a>
                </div>

                <button type="submit" class="primary-btn">Sign In</button>
            </form>

            <div class="form-footer">
                <div class="divider"><span>Are you a shopper?</span></div>
                <p>Access our exclusive deals here:</p>
                <a href="customer-gate.html" class="private-portal-btn">
                <a href="VIP.html" class="VIP">🔑 Regular Customer Login Form</a>
                </a>
            </div>
        </div>
    </div>

    <script src="Sing in.js"></script>
</body>
</html>
